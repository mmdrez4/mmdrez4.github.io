      - layout: left
        title: NLP and DH Lab
        link: http://language.ml/
        # link_text: boringcompany.com
        sub_title: Research Assistant
        caption: November 2022 - Present
        quote: >
          Solving 21st century problems by diging holes and making game changing products like the *not a flamethrower*
        description: | # this will include new lines to allow paragraphs
            Since commencing my research at the NLP and DH lab, my focus has been on two primary endeavors. Firstly, I have dedicated my efforts to the creation of an open-source Persian Wordnet. Simultaneously, I have actively participated in the development of a Persian/English medical question-answering model that leverages the power of Large Language Models.| 
            In addition to these projects, I have been deeply involved in a noteworthy initiative aimed at pioneering the development of a Persian Large Language Model (LLM). This undertaking has been carried out in close collaboration with three esteemed professors, further emphasizing the significance of our research efforts.
      
      - layout: left
        title: Sharif University of Technology
        link: https://en.sharif.edu
        # link_text: boringcompany.com
        sub_title: Research Assistant
        caption: September 2021 - July 2022
        quote: >
          Image Processing and Facial Image Analysis
        description: | # this will include new lines to allow paragraphs
            In my research endeavors, I've ventured into the dynamic field of facial image analysis with two distinct yet interconnected focuses. The first revolves around leveraging Graph Convolutional Networks (GCN) to predict linkages between face images, streamlining the process of grouping images portraying the same individual. Simultaneously, I've explored a novel approach, treating face clustering as a pairwise classification task, training a classifier to directly discern whether two faces should be categorized within the same class. These multifaceted efforts collectively represent my dedication to advancing the capabilities of facial recognition and clustering, promising innovative solutions that could redefine the landscape of this critical area of study.



