      - layout: left
        title: NLP and DH Lab
        link: http://language.ml/
        # link_text: boringcompany.com
        sub_title: Research Assistant
        caption: November 2022 - Present
        quote: >
          A Comprehensive Toolkit for NLP and Information Retrieval: Tackling Linguistic Challenges in Both Persian and English.
        description: | # this will include new lines to allow paragraphs
            Since commencing my research at the NLP and DH lab, my focus has been on two primary endeavors. Firstly, I have dedicated my efforts to the creation of an open-source Persian Wordnet. Simultaneously, I have actively participated in the development of a Persian/English medical question-answering model that leverages the power of Large Language Models.| 
            In addition to these projects, I have been deeply involved in a noteworthy initiative aimed at pioneering the development of a Persian Large Language Model (LLM). This undertaking has been carried out in close collaboration with three esteemed professors, further emphasizing the significance of our research efforts.
      
