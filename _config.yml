about_content: | # this will include new lines to allow paragraphs
  Greetings! I am Mohammadreza Daviran, recently I got my degree in Computer Engineering at <a href="https://en.sharif.edu/">Sharif University of Technology</a>,
  which is renowned as a leading educational institution in Iran and the Middle East.
  At the moment, I am actively engaged in the development of a Persian open-source Wordnet. 
  Notably, The paper for this project will be submitted to the Language Resources and Evaluation Journal. 
  Additionally, I am engaging in a substantial and pioneering project to create a Persian Large Language Model.
  Furthermore, One of my strong fascinations lies in the applications of Natural Language Processing (NLP) and Machine Learning within the healthcare sector. As a testament to this passion,
  you can access the preprint of our paper, "A Novel Approach to Persian Medical and Drug Question-Answering Utilizing Large Language Models", through <a href="https://openreview.net/forum?id=ER-6OuoaNY">this</a> link.
  
  My fields of interest are:
  
  - Natural Language Processing 

  - Machine Learning

  - ML for Health

  - Large Language Models
  
  - Multimodal Deep Learning
  
  - Modern Information Retrieval
  
  - Bioinformatics
  

